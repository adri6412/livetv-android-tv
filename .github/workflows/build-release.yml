name: Build Release APK

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v1.0.0, v1.5.31, etc.
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Build Release APK
      run: ./gradlew assembleRelease
      
    - name: List APK files
      run: |
        echo "=== Debug APK files ==="
        ls -la app/build/outputs/apk/debug/ || echo "Debug APK directory not found"
        echo "=== Release APK files ==="
        ls -la app/build/outputs/apk/release/ || echo "Release APK directory not found"
        echo "=== All APK files in outputs ==="
        find app/build/outputs/ -name "*.apk" -type f || echo "No APK files found"
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: livetv-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: livetv-release-apk
        path: app/build/outputs/apk/release/
        retention-days: 30
        if-no-files-found: warn
        
    - name: Build Summary
      run: |
        echo "## 🎯 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Debug APK**: Built successfully" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Release APK**: Built successfully" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📱 **APK Files**: Available in artifacts" >> $GITHUB_STEP_SUMMARY
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "🚀 **Release**: Created automatically" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📋 **License**: Mozilla Public License 2.0 (MPL 2.0)" >> $GITHUB_STEP_SUMMARY
        echo "📄 **Dependencies**: See THIRD_PARTY_LICENSES file" >> $GITHUB_STEP_SUMMARY
