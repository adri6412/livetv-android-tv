name: Build Signed Release APK

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v1.0.0, v1.5.31, etc.
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-signed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Check keystore availability
      id: keystore-check
      run: |
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "keystore-available=true" >> $GITHUB_OUTPUT
        else
          echo "keystore-available=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Create keystore (if not exists)
      if: steps.keystore-check.outputs.keystore-available == 'false'
      run: |
        echo "⚠️ No keystore found in secrets. Building unsigned APK."
        echo "To build signed APK, add KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, and KEY_PASSWORD to repository secrets."
        
    - name: Setup keystore (if exists)
      if: steps.keystore-check.outputs.keystore-available == 'true'
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
        echo "Keystore created at keystore.jks"
        
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Build Release APK (Unsigned)
      if: steps.keystore-check.outputs.keystore-available == 'false'
      run: ./gradlew assembleRelease
      
    - name: Build Release APK (Signed)
      if: steps.keystore-check.outputs.keystore-available == 'true'
      run: |
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file="${{ github.workspace }}/keystore.jks" \
          -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
          -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
          -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"
          
    - name: List APK files
      run: |
        echo "=== Debug APK files ==="
        ls -la app/build/outputs/apk/debug/ || echo "Debug APK directory not found"
        echo "=== Release APK files ==="
        ls -la app/build/outputs/apk/release/ || echo "Release APK directory not found"
        echo "=== All APK files in outputs ==="
        find app/build/outputs/ -name "*.apk" -type f || echo "No APK files found"
          
    - name: Rename APKs with version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION="${{ github.ref_name }}"
        else
          VERSION="dev-$(git rev-parse --short HEAD)"
        fi
        RELEASE_SRC=$(find app/build/outputs/apk/release/ -name "*.apk" | head -1)
        [ -n "$RELEASE_SRC" ] && cp "$RELEASE_SRC" "LiveTV-${VERSION}.apk"
        DEBUG_SRC="app/build/outputs/apk/debug/app-debug.apk"
        [ -f "$DEBUG_SRC" ] && cp "$DEBUG_SRC" "LiveTV-${VERSION}-debug.apk"

    - name: Upload Release APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: livetv-release-apk
        path: LiveTV-*[!g].apk
        retention-days: 30

    - name: Upload Debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: livetv-debug-apk
        path: LiveTV-*-debug.apk
        retention-days: 30

    - name: Generate changelog
      if: startsWith(github.ref, 'refs/tags/')
      id: changelog
      run: |
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -n "$PREV_TAG" ]; then
          LOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges)
          RANGE="since ${PREV_TAG}"
        else
          LOG=$(git log --oneline --no-merges -30)
          RANGE="last 30 commits"
        fi
        {
          echo "log<<EOF"
          echo "$LOG"
          echo "EOF"
          echo "range=$RANGE"
        } >> "$GITHUB_OUTPUT"

    - name: Create GitHub Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        name: LiveTV ${{ github.ref_name }}
        body: |
          ## Changelog (${{ steps.changelog.outputs.range }})
          ```
          ${{ steps.changelog.outputs.log }}
          ```
        files: LiveTV-*.apk
        generate_release_notes: false
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build Summary
      run: |
        echo "## 🎯 Signed Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Debug APK**: Built successfully" >> $GITHUB_STEP_SUMMARY
        if [[ "${{ steps.keystore-check.outputs.keystore-available }}" == "true" ]]; then
          echo "✅ **Release APK**: Built and signed successfully" >> $GITHUB_STEP_SUMMARY
          echo "🔐 **Signing**: APK is digitally signed" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ **Release APK**: Built but unsigned (no keystore in secrets)" >> $GITHUB_STEP_SUMMARY
          echo "📝 **Note**: Add keystore secrets to build signed APK" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📱 **APK Files**: Available in artifacts" >> $GITHUB_STEP_SUMMARY
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "🚀 **Release**: Created automatically" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📋 **License**: Mozilla Public License 2.0 (MPL 2.0)" >> $GITHUB_STEP_SUMMARY
        echo "📄 **Dependencies**: See THIRD_PARTY_LICENSES file" >> $GITHUB_STEP_SUMMARY
